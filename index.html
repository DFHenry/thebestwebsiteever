<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/index.js"></script>
    <title>THE BEST WEBSITE EVER!!!</title>
</head>
<body>
    <header>
        <h1 style="color:red">THE BEST WEBSITE EVER!!!</h1>   
    </header>

    <!-- HomePage -->
    <section id="signIn">
        <h2>Are you ready to experience a TRUE internet experience?</h2>
        <div id="login">
            <form id="userSignIn">
                <label for="username">User Name: </label>
                <input type="text" name="username">
                <label for="password">Password: </label>
                <input type="password" name="password">
                <br>
                <input type="submit" value="Login">
            </form>
            <p id="loginError">Invalid username or password.</p>
        </div>
        <br>
        <button id="newMemberButton">Sign Up Here!</button>
    </section>

    <section id="newMember">
        <h2>Best Website Ever: New Member Sign-Up</h2>
        <form id="newMemberForm">
            <p>please enter the following information into the form below</p>
            <div>
                <label for="username">Username: </label>
                <input type="text" name="username">
                <p class="invalidMessage" id="invalidName">Please Enter a Name</p>
            </div>
            <div>
                <label for="email">Email Address: </label>
                <input type="email" name="email">
                <p class="invalidMessage" id="invalidEmail">Please Enter a Valid Email Address</p>
            </div>
            <div>
                <label for="password">Pasword: </label>
                <input type="password" name="password">
            </div>
            <div>
                <label for="confirmPass">Confirm Password</label>
                <input type="password" name="confirmPass">
                <p class="invalidMessage" id="invalidPassword">Please Repeat your Password</p>
            </div>
            <br>
            <input type="submit" value="Sign Up">
        </form> 
        <p id="result"></p>  
    </section>
    

</body>
</html>
